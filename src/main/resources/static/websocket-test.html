<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Endless Node - WebSocket 控制台测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.08);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #aeaeb2;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --input-bg: #f5f5f7;
            --input-border: rgba(0, 0, 0, 0.08);
            --success: #34c759;
            --error: #ff3b30;
            --warning: #ff9500;
            --info: #0071e3;
        }

        :root.dark {
            --bg: #1d1d1f;
            --card-bg: #2c2c2e;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.3);
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --text-muted: #636366;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --input-bg: #3a3a3c;
            --input-border: rgba(255, 255, 255, 0.08);
            --success: #30d158;
            --error: #ff453a;
            --warning: #ff9f0a;
            --info: #0a84ff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo i {
            font-size: 20px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--input-border);
        }

        .theme-toggle i {
            font-size: 16px;
            color: var(--text-secondary);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .theme-toggle.rotating i {
            transform: rotate(360deg);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(52, 199, 89, 0.12);
            color: var(--success);
            border: 1px solid rgba(52, 199, 89, 0.25);
        }

        :root.dark .alert-success {
            background: rgba(48, 209, 88, 0.15);
            border-color: rgba(48, 209, 88, 0.3);
        }

        .alert-error {
            background: rgba(255, 59, 48, 0.12);
            color: var(--error);
            border: 1px solid rgba(255, 59, 48, 0.25);
        }

        :root.dark .alert-error {
            background: rgba(255, 69, 58, 0.15);
            border-color: rgba(255, 69, 58, 0.3);
        }

        .alert-info {
            background: rgba(0, 113, 227, 0.08);
            color: var(--info);
            border: 1px solid rgba(0, 113, 227, 0.15);
        }

        :root.dark .alert-info {
            background: rgba(10, 132, 255, 0.12);
            border-color: rgba(10, 132, 255, 0.2);
        }

        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px var(--card-shadow);
            border: 1px solid var(--card-border);
        }

        .card h2 {
            color: var(--text-primary);
            margin-bottom: 18px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 span {
            color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--input-border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }

        :root.dark .form-group input:focus,
        :root.dark .form-group select:focus {
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-right: 8px;
            margin-bottom: 8px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        :root.dark .btn:hover {
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: var(--error);
        }

        :root.dark .btn-danger {
            background: var(--error);
        }

        .btn-danger:hover {
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
        }

        :root.dark .btn-danger:hover {
            box-shadow: 0 4px 12px rgba(255, 69, 58, 0.3);
        }

        .btn-success {
            background: var(--success);
        }

        :root.dark .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
        }

        :root.dark .btn-success:hover {
            box-shadow: 0 4px 12px rgba(48, 209, 88, 0.3);
        }

        .btn-ghost {
            background: var(--input-bg);
            color: var(--text-secondary);
            border: 1px solid var(--input-border);
        }

        .btn-ghost:hover {
            background: var(--input-border);
            color: var(--text-primary);
        }

        .console-container {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 18px;
            margin-top: 16px;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            color: #e0e0e0;
        }

        .console-output {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px;
            font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            color: #7ee787;
            height: 380px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .console-input {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .console-input input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
        }

        .console-input input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }

        .console-input input::placeholder {
            color: #484f58;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-connected {
            background: var(--success);
            box-shadow: 0 0 6px rgba(52, 199, 89, 0.5);
        }

        .status-disconnected {
            background: var(--error);
            box-shadow: 0 0 6px rgba(255, 59, 48, 0.5);
        }

        .status-connecting {
            background: var(--warning);
            box-shadow: 0 0 6px rgba(255, 149, 0, 0.5);
        }

        .server-info {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .server-info h4 {
            color: var(--text-primary);
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 700;
        }

        .server-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .server-detail {
            display: flex;
            flex-direction: column;
        }

        .server-detail-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .server-detail-value {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid var(--input-border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 10px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px 12px 32px;
            }

            .header h1 {
                font-size: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .console-input {
                flex-direction: column;
            }

            .console-output {
                height: 280px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="header-logo">
                <i class="fas fa-terminal"></i>
            </div>
            <div>
                <h1>WebSocket 控制台</h1>
                <p>Endless Node 服务器控制台实时监控</p>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="alert alert-success" id="successAlert"></div>
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-info" id="infoAlert"></div>

    <div class="card">
        <h2><span>+</span> 连接配置</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="token">访问令牌 (Token)</label>
                <input id="token" placeholder="请输入访问令牌" type="text">
            </div>
            <div class="form-group">
                <label for="serverSelect">选择服务器</label>
                <select id="serverSelect">
                    <option value="">请选择服务器...</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>WebSocket 状态: <span id="wsStatus">未连接</span></label>
                <div style="margin-top: 10px;">
                    <button class="btn btn-success" id="connectBtn">连接 WebSocket</button>
                    <button class="btn btn-danger" disabled id="disconnectBtn">断开连接</button>
                    <button class="btn btn-ghost" id="loadServersBtn">加载服务器列表</button>
                </div>
            </div>
            <div class="form-group">
                <label>自动滚动控制台</label>
                <div style="margin-top: 10px;">
                    <input checked id="autoScroll" style="transform: scale(1.15); margin-right: 8px;" type="checkbox">
                    <span style="font-size: 14px; color: var(--text-secondary);">启用</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card" id="serverInfoCard" style="display: none;">
        <h2><span>+</span> 服务器信息</h2>
        <div id="serverInfo"></div>
    </div>

    <div class="card">
        <h2><span>+</span> 服务器控制台</h2>
        <div class="console-container">
            <div class="console-header">
                <div>
                    <span id="consoleStatus">
                        <span class="status-indicator status-disconnected"></span>
                        未连接
                    </span>
                </div>
                <div>
                    <button class="btn btn-success btn-sm" disabled id="subscribeBtn">订阅控制台</button>
                    <button class="btn btn-danger btn-sm" disabled id="unsubscribeBtn">取消订阅</button>
                    <button class="btn btn-ghost btn-sm" id="clearConsoleBtn">清空控制台</button>
                </div>
            </div>
            <div class="console-output" id="consoleOutput">
控制台输出将在这里显示...
            </div>
            <div class="console-input">
                <input disabled id="commandInput" placeholder="输入服务器命令 (例如: list, help, stop)" type="text">
                <button class="btn btn-success" disabled id="sendCommandBtn">发送命令</button>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="font-size: 14px; color: var(--text-muted);">加载中...</p>
    </div>

    <div class="back-link">
        <a href="/index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</div>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    // Theme
    const root = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        root.classList.add('dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
    }
    themeToggle.addEventListener('click', () => {
        themeToggle.classList.add('rotating');
        setTimeout(() => {
            root.classList.toggle('dark');
            if (root.classList.contains('dark')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }, 200);
        setTimeout(() => themeToggle.classList.remove('rotating'), 500);
    });

    let stompClient = null;
    let currentServerId = null;
    let isSubscribed = false;

    function showAlert(message, type = 'success') {
        const alertTypes = {
            'success': 'successAlert',
            'error': 'errorAlert',
            'info': 'infoAlert'
        };
        const alert = document.getElementById(alertTypes[type]);
        alert.textContent = message;
        alert.style.display = 'block';
        setTimeout(() => { alert.style.display = 'none'; }, 5000);
    }

    function updateWsStatus(status, message) {
        const statusElement = document.getElementById('wsStatus');
        statusElement.innerHTML = `<span class="status-indicator status-${status}"></span>${message}`;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        if (status === 'connected') {
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
        } else if (status === 'disconnected') {
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
        } else if (status === 'connecting') {
            connectBtn.disabled = true;
            disconnectBtn.disabled = true;
        }
    }

    function updateConsoleStatus(status, message) {
        const statusElement = document.getElementById('consoleStatus');
        statusElement.innerHTML = `<span class="status-indicator status-${status}"></span>${message}`;

        const subscribeBtn = document.getElementById('subscribeBtn');
        const unsubscribeBtn = document.getElementById('unsubscribeBtn');
        const commandInput = document.getElementById('commandInput');
        const sendCommandBtn = document.getElementById('sendCommandBtn');

        if (status === 'connected' && isSubscribed) {
            subscribeBtn.disabled = true;
            unsubscribeBtn.disabled = false;
            commandInput.disabled = false;
            sendCommandBtn.disabled = false;
        } else {
            subscribeBtn.disabled = false;
            unsubscribeBtn.disabled = true;
            commandInput.disabled = true;
            sendCommandBtn.disabled = true;
        }
    }

    function addConsoleOutput(message, type = 'normal') {
        const consoleOutput = document.getElementById('consoleOutput');
        const timestamp = new Date().toLocaleTimeString();

        let prefix = '';
        let color = '';

        switch (type) {
            case 'error':   prefix = '[ERROR] ';   color = 'color: #ff7b72;'; break;
            case 'warning': prefix = '[WARN] ';    color = 'color: #d29922;'; break;
            case 'info':    prefix = '[INFO] ';    color = 'color: #79c0ff;'; break;
            case 'success': prefix = '[SUCCESS] '; color = 'color: #7ee787;'; break;
            default:        prefix = '[LOG] ';     color = 'color: #7ee787;';
        }

        const formattedMessage = `[${timestamp}] ${prefix}${message}\n`;
        consoleOutput.textContent += formattedMessage;

        if (document.getElementById('autoScroll').checked) {
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
    }

    function connectWebSocket() {
        const token = document.getElementById('token').value.trim();
        if (!token) {
            showAlert('请输入访问令牌', 'error');
            return;
        }

        updateWsStatus('connecting', '连接中...');

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
            {'X-Endless-Token': token},
            function (frame) {
                updateWsStatus('connected', '已连接');
                showAlert('WebSocket 连接成功', 'success');
                document.getElementById('subscribeBtn').disabled = false;
            },
            function (error) {
                updateWsStatus('disconnected', '连接失败');
                showAlert('WebSocket 连接失败: ' + error, 'error');
            }
        );
    }

    function disconnectWebSocket() {
        if (stompClient && stompClient.connected) {
            stompClient.disconnect(() => {
                updateWsStatus('disconnected', '已断开');
                updateConsoleStatus('disconnected', '未连接');
                showAlert('WebSocket 连接已断开', 'info');
                isSubscribed = false;
            });
        }
    }

    async function loadServers() {
        const token = document.getElementById('token').value.trim();
        if (!token) {
            showAlert('请输入访问令牌', 'error');
            return;
        }

        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const response = await fetch('/api/servers/list', {
                headers: { 'X-Endless-Token': token }
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            const servers = data.servers || [];
            const serverSelect = document.getElementById('serverSelect');

            serverSelect.innerHTML = '<option value="">请选择服务器...</option>';

            servers.forEach(server => {
                const option = document.createElement('option');
                option.value = server.id;
                option.textContent = `${server.instanceName} (${server.status})`;
                serverSelect.appendChild(option);
            });

            showAlert(`成功加载 ${servers.length} 个服务器`, 'success');
        } catch (error) {
            showAlert('加载服务器列表失败: ' + error.message, 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    function displayServerInfo(server) {
        const serverInfoCard = document.getElementById('serverInfoCard');
        const serverInfo = document.getElementById('serverInfo');

        serverInfo.innerHTML = `
            <div class="server-info">
                <h4>服务器详情</h4>
                <div class="server-details">
                    <div class="server-detail">
                        <div class="server-detail-label">实例名称</div>
                        <div class="server-detail-value">${server.instanceName || 'N/A'}</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">核心类型</div>
                        <div class="server-detail-value">${server.coreType || 'N/A'}</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">版本</div>
                        <div class="server-detail-value">${server.version || 'N/A'}</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">状态</div>
                        <div class="server-detail-value">${server.status || 'N/A'}</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">内存配置</div>
                        <div class="server-detail-value">${server.memoryMb || 0} MB</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">文件路径</div>
                        <div class="server-detail-value">${server.filePath || 'N/A'}</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">创建时间</div>
                        <div class="server-detail-value">${server.createdAt ? new Date(server.createdAt).toLocaleString('zh-CN') : 'N/A'}</div>
                    </div>
                    <div class="server-detail">
                        <div class="server-detail-label">更新时间</div>
                        <div class="server-detail-value">${server.updatedAt ? new Date(server.updatedAt).toLocaleString('zh-CN') : 'N/A'}</div>
                    </div>
                </div>
            </div>
        `;

        serverInfoCard.style.display = 'block';
    }

    function subscribeConsole() {
        const serverId = document.getElementById('serverSelect').value;
        if (!serverId) {
            showAlert('请选择服务器', 'error');
            return;
        }

        if (!stompClient || !stompClient.connected) {
            showAlert('WebSocket 未连接', 'error');
            return;
        }

        currentServerId = serverId;

        fetch('/api/servers/list', {
            headers: { 'X-Endless-Token': document.getElementById('token').value }
        })
            .then(response => response.json())
            .then(data => {
                const server = data.servers.find(s => s.id == serverId);
                if (server) displayServerInfo(server);
            })
            .catch(error => console.error('获取服务器信息失败:', error));

        stompClient.subscribe(`/topic/console/${serverId}`, function (message) {
            const data = JSON.parse(message.body);
            if (data.line) {
                addConsoleOutput(data.line);
            } else if (data.error) {
                addConsoleOutput(data.error, 'error');
            } else if (data.message) {
                addConsoleOutput(data.message, 'info');
            }
        });

        isSubscribed = true;
        updateConsoleStatus('connected', `已订阅服务器 #${serverId}`);
        addConsoleOutput(`开始监听服务器 ${serverId} 的控制台输出`, 'info');

        stompClient.send('/app/console/subscribe', {}, JSON.stringify({
            serverId: parseInt(serverId),
            token: document.getElementById('token').value
        }));
    }

    function unsubscribeConsole() {
        if (isSubscribed) {
            isSubscribed = false;
            currentServerId = null;
            updateConsoleStatus('disconnected', '未连接');
            addConsoleOutput('已停止监听控制台输出', 'warning');
            document.getElementById('serverInfoCard').style.display = 'none';
        }
    }

    function sendCommand() {
        const command = document.getElementById('commandInput').value.trim();
        if (!command) {
            showAlert('请输入命令', 'error');
            return;
        }

        if (!currentServerId) {
            showAlert('未订阅控制台', 'error');
            return;
        }

        fetch(`/api/servers/${currentServerId}/command`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Endless-Token': document.getElementById('token').value
            },
            body: JSON.stringify({command: command})
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addConsoleOutput(`> ${command}`, 'success');
                    document.getElementById('commandInput').value = '';
                } else {
                    addConsoleOutput(`命令执行失败: ${data.error}`, 'error');
                }
            })
            .catch(error => {
                addConsoleOutput(`发送命令失败: ${error.message}`, 'error');
            });
    }

    function clearConsole() {
        document.getElementById('consoleOutput').textContent = '';
        addConsoleOutput('控制台已清空', 'info');
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('connectBtn').addEventListener('click', connectWebSocket);
        document.getElementById('disconnectBtn').addEventListener('click', disconnectWebSocket);
        document.getElementById('loadServersBtn').addEventListener('click', loadServers);
        document.getElementById('subscribeBtn').addEventListener('click', subscribeConsole);
        document.getElementById('unsubscribeBtn').addEventListener('click', unsubscribeConsole);
        document.getElementById('clearConsoleBtn').addEventListener('click', clearConsole);
        document.getElementById('sendCommandBtn').addEventListener('click', sendCommand);
        document.getElementById('commandInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendCommand();
        });
        document.getElementById('serverSelect').addEventListener('change', function () {
            if (!this.value) {
                document.getElementById('serverInfoCard').style.display = 'none';
                return;
            }
            if (isSubscribed) unsubscribeConsole();
        });

        // 从 URL 参数读取 token 并填充
        var urlParams = new URLSearchParams(window.location.search);
        var tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            document.getElementById('token').value = tokenFromUrl;
        }
    });

    window.addEventListener('beforeunload', function () {
        if (stompClient && stompClient.connected) stompClient.disconnect();
    });
</script>
</body>
</html>
