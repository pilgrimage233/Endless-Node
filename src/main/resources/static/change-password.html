<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Node - 修改密码</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.08);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #aeaeb2;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --input-bg: #f5f5f7;
            --input-border: rgba(0, 0, 0, 0.08);
            --input-focus: #0071e3;
            --success-bg: rgba(52, 199, 89, 0.12);
            --success-text: #34c759;
            --success-border: rgba(52, 199, 89, 0.25);
            --error-bg: rgba(255, 59, 48, 0.12);
            --error-text: #ff3b30;
            --error-border: rgba(255, 59, 48, 0.25);
            --warning-bg: rgba(255, 149, 0, 0.12);
            --warning-text: #ff9500;
            --warning-border: rgba(255, 149, 0, 0.25);
            --divider: rgba(0, 0, 0, 0.06);
        }

        :root.dark {
            --bg: #1d1d1f;
            --card-bg: #2c2c2e;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.3);
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --text-muted: #636366;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --input-bg: #3a3a3c;
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus: #0a84ff;
            --success-bg: rgba(48, 209, 88, 0.15);
            --success-text: #30d158;
            --success-border: rgba(48, 209, 88, 0.3);
            --error-bg: rgba(255, 69, 58, 0.15);
            --error-text: #ff453a;
            --error-border: rgba(255, 69, 58, 0.3);
            --warning-bg: rgba(255, 159, 10, 0.15);
            --warning-text: #ff9f0a;
            --warning-border: rgba(255, 159, 10, 0.3);
            --divider: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 48px 36px;
            box-shadow: 0 4px 24px var(--card-shadow);
            border: 1px solid var(--card-border);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 32px;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--input-border);
        }

        .theme-toggle i {
            font-size: 16px;
            color: var(--text-secondary);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .theme-toggle.rotating i {
            transform: rotate(360deg);
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon i {
            font-size: 28px;
            color: white;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .card-header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-border);
        }

        .alert-error {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
        }

        .notice {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .notice-icon {
            font-size: 18px;
            margin-bottom: 6px;
            display: block;
        }

        .notice-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--warning-text);
            margin-bottom: 4px;
        }

        .notice-desc {
            font-size: 12px;
            color: var(--warning-text);
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 15px;
            transition: color 0.2s ease;
            pointer-events: none;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 13px 42px 13px 42px;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }

        :root.dark .form-group input:focus {
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--accent);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 15px;
            transition: color 0.2s ease;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        .strength-bar {
            margin-top: 10px;
            display: none;
        }

        .strength-bar.visible {
            display: block;
        }

        .strength-track {
            width: 100%;
            height: 4px;
            background: var(--input-border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease, background 0.3s ease;
            width: 0;
        }

        .strength-fill.weak {
            width: 33%;
            background: #ff3b30;
        }

        .strength-fill.medium {
            width: 66%;
            background: #ff9500;
        }

        .strength-fill.strong {
            width: 100%;
            background: #34c759;
        }

        .strength-label {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .strength-label.weak { color: #ff3b30; }
        .strength-label.medium { color: #ff9500; }
        .strength-label.strong { color: #34c759; }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            margin-top: 6px;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        :root.dark .btn-submit:hover {
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-submit .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .card-footer {
            margin-top: 28px;
            text-align: center;
        }

        .footer-divider {
            height: 1px;
            background: var(--divider);
            margin-bottom: 20px;
        }

        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .footer-link:hover {
            color: var(--accent);
        }

        .footer-link i {
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="card-header">
            <div class="header-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>修改密码</h1>
            <p class="subtitle" id="changePasswordSubtitle">请设置您的新密码</p>
        </div>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <div class="notice" id="firstLoginNotice">
            <span class="notice-icon"><i class="fas fa-exclamation-triangle"></i></span>
            <div class="notice-title">首次登录</div>
            <div class="notice-desc">为了您的账户安全，请设置一个新密码</div>
        </div>

        <form id="changePasswordForm">
            <div class="form-group" id="oldPasswordGroup" style="display: none;">
                <label for="oldPassword">原密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="oldPassword" name="oldPassword" autocomplete="current-password" placeholder="请输入原密码">
                    <button type="button" class="password-toggle" onclick="togglePassword('oldPassword', this)" aria-label="显示密码">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">新密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required placeholder="请输入新密码">
                    <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)" aria-label="显示密码">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="strength-bar" id="strengthBar">
                    <div class="strength-track">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-label" id="strengthLabel"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认新密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-double input-icon"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required placeholder="请再次输入新密码">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)" aria-label="显示密码">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <div class="btn-content">
                    <div class="spinner"></div>
                    <span class="btn-text">修改密码</span>
                </div>
            </button>
        </form>

        <div class="card-footer">
            <div class="footer-divider"></div>
            <a href="/index.html" class="footer-link">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>
        </div>
    </div>

<script>
    var isFirstLogin = false;

    var root = document.documentElement;
    var themeToggle = document.getElementById('themeToggle');
    var themeIcon = themeToggle.querySelector('i');
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        root.classList.add('dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
    }
    themeToggle.addEventListener('click', function() {
        themeToggle.classList.add('rotating');
        setTimeout(function() {
            root.classList.toggle('dark');
            if (root.classList.contains('dark')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }, 200);
        setTimeout(function() { themeToggle.classList.remove('rotating'); }, 500);
    });

    function togglePassword(inputId, btn) {
        var input = document.getElementById(inputId);
        var icon = btn.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    }

    function showAlert(message, type) {
        type = type || 'success';
        var el = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 5000);
    }

    async function checkLoginStatus() {
        try {
            var response = await fetch('/api/auth/check');
            var result = await response.json();

            if (!result.loggedIn) {
                window.location.href = '/login.html';
                return;
            }

            if (result.firstLogin === 1) {
                isFirstLogin = true;
                document.getElementById('firstLoginNotice').style.display = 'block';
                document.getElementById('changePasswordSubtitle').textContent = '首次登录，请设置新密码';
                document.getElementById('submitBtn').querySelector('.btn-text').textContent = '设置密码';
            } else {
                document.getElementById('oldPasswordGroup').style.display = 'block';
            }
        } catch (error) {
            window.location.href = '/login.html';
        }
    }

    function checkPasswordStrength(password) {
        var bar = document.getElementById('strengthBar');
        var fill = document.getElementById('strengthFill');
        var label = document.getElementById('strengthLabel');

        if (!password) {
            bar.classList.remove('visible');
            return;
        }

        bar.classList.add('visible');

        var score = 0;
        if (password.length >= 6) score++;
        if (password.length >= 8) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        fill.className = 'strength-fill';
        label.className = 'strength-label';

        if (score < 3) {
            fill.classList.add('weak');
            label.classList.add('weak');
            label.innerHTML = '<i class="fas fa-times-circle"></i> 弱';
        } else if (score < 5) {
            fill.classList.add('medium');
            label.classList.add('medium');
            label.innerHTML = '<i class="fas fa-exclamation-circle"></i> 中等';
        } else {
            fill.classList.add('strong');
            label.classList.add('strong');
            label.innerHTML = '<i class="fas fa-check-circle"></i> 强';
        }
    }

    async function handlePasswordChange(formData) {
        var btn = document.getElementById('submitBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        try {
            var endpoint = isFirstLogin ? '/api/auth/force-change-password' : '/api/auth/change-password';
            var response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            var result = await response.json();

            if (response.ok && result.success) {
                showAlert(result.message);
                setTimeout(function() { window.location.href = '/index.html'; }, 2000);
            } else {
                showAlert(result.error || '密码修改失败', 'error');
            }
        } catch (error) {
            showAlert('密码修改失败: ' + error.message, 'error');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var newPassword = document.getElementById('newPassword').value;
        var confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            showAlert('新密码和确认密码不匹配', 'error');
            return;
        }

        if (newPassword.length < 6) {
            showAlert('密码长度不能少于6位', 'error');
            return;
        }

        var formData = {
            newPassword: newPassword,
            confirmPassword: confirmPassword
        };

        if (!isFirstLogin) {
            var oldPassword = document.getElementById('oldPassword').value;
            if (!oldPassword) {
                showAlert('请输入原密码', 'error');
                return;
            }
            formData.oldPassword = oldPassword;
        }

        handlePasswordChange(formData);
    });

    document.getElementById('newPassword').addEventListener('input', function() {
        checkPasswordStrength(this.value);
    });

    document.addEventListener('DOMContentLoaded', checkLoginStatus);
</script>
</body>
</html>
