<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Node - 用户登录</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.08);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #aeaeb2;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --input-bg: #f5f5f7;
            --input-border: rgba(0, 0, 0, 0.08);
            --input-focus: #0071e3;
            --success-bg: rgba(52, 199, 89, 0.12);
            --success-text: #34c759;
            --success-border: rgba(52, 199, 89, 0.25);
            --error-bg: rgba(255, 59, 48, 0.12);
            --error-text: #ff3b30;
            --error-border: rgba(255, 59, 48, 0.25);
            --divider: rgba(0, 0, 0, 0.06);
        }

        :root.dark {
            --bg: #1d1d1f;
            --card-bg: #2c2c2e;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.3);
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --text-muted: #636366;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --input-bg: #3a3a3c;
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus: #0a84ff;
            --success-bg: rgba(48, 209, 88, 0.15);
            --success-text: #30d158;
            --success-border: rgba(48, 209, 88, 0.3);
            --error-bg: rgba(255, 69, 58, 0.15);
            --error-text: #ff453a;
            --error-border: rgba(255, 69, 58, 0.3);
            --divider: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 48px 36px;
            box-shadow: 0 4px 24px var(--card-shadow);
            border: 1px solid var(--card-border);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 32px;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--input-border);
        }

        .theme-toggle i {
            font-size: 16px;
            color: var(--text-secondary);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .theme-toggle.rotating i {
            transform: rotate(360deg);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo i {
            font-size: 28px;
            color: white;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .logo-section p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-border);
        }

        .alert-error {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
        }

        .demo-info {
            background: rgba(0, 113, 227, 0.06);
            border: 1px solid rgba(0, 113, 227, 0.12);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 24px;
        }

        :root.dark .demo-info {
            background: rgba(10, 132, 255, 0.08);
            border-color: rgba(10, 132, 255, 0.2);
        }

        .demo-info-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .demo-info-header i {
            color: var(--accent);
            font-size: 13px;
        }

        .demo-info-header span {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }

        .demo-info-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .demo-info-value {
            font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--input-bg);
            padding: 3px 10px;
            border-radius: 6px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 15px;
            transition: color 0.2s ease;
            pointer-events: none;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }

        :root.dark .form-group input:focus {
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--accent);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 15px;
            transition: color 0.2s ease;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin-top: 6px;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        :root.dark .btn-login:hover {
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-login .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            margin-top: 28px;
            text-align: center;
        }

        .footer-divider {
            height: 1px;
            background: var(--divider);
            margin-bottom: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-link:hover {
            color: var(--accent);
        }

        .footer-link i {
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }
            .footer-links {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header">
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="logo-section">
            <div class="logo">
                <i class="fas fa-server"></i>
            </div>
            <h1>Endless Node</h1>
            <p>节点管理系统</p>
        </div>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <div class="demo-info" id="demoInfo">
            <div class="demo-info-header">
                <i class="fas fa-info-circle"></i>
                <span>默认管理员账户</span>
            </div>
            <div class="demo-info-row">
                <span class="demo-info-label">用户名</span>
                <span class="demo-info-value">admin</span>
            </div>
            <div class="demo-info-row">
                <span class="demo-info-label">密码</span>
                <span class="demo-info-value">admin123</span>
            </div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input autocomplete="username" id="username" name="username" required type="text" placeholder="请输入用户名">
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input autocomplete="current-password" id="password" name="password" required type="password" placeholder="请输入密码">
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="显示密码">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button class="btn-login" id="loginBtn" type="submit">
                <div class="btn-content">
                    <div class="spinner"></div>
                    <span class="btn-text">登录</span>
                </div>
            </button>
        </form>

        <div class="login-footer">
            <div class="footer-divider"></div>
            <div class="footer-links">
                <a href="/tokens.html" class="footer-link">
                    <i class="fas fa-key"></i> 密钥管理
                </a>
                <a href="/index.html" class="footer-link">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </div>

<script>
    const root = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        root.classList.add('dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
    }
    themeToggle.addEventListener('click', () => {
        themeToggle.classList.add('rotating');
        setTimeout(() => {
            root.classList.toggle('dark');
            if (root.classList.contains('dark')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }, 200);
        setTimeout(() => themeToggle.classList.remove('rotating'), 500);
    });

    document.getElementById('passwordToggle').addEventListener('click', function() {
        const input = document.getElementById('password');
        const icon = this.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });

    function showAlert(message, type) {
        type = type || 'success';
        const el = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 4000);
    }

    async function checkLoginStatus() {
        try {
            const r = await fetch('/api/auth/check');
            const result = await r.json();
            if (result.loggedIn) window.location.href = '/tokens.html';
        } catch (e) {}
    }

    async function handleLogin(formData) {
        const btn = document.getElementById('loginBtn');
        btn.classList.add('loading');
        btn.disabled = true;
        try {
            const r = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const result = await r.json();
            if (r.ok && result.success) {
                if (result.requirePasswordChange) {
                    showAlert('首次登录，请设置新密码');
                    setTimeout(function() { window.location.href = '/change-password.html'; }, 1000);
                } else {
                    showAlert('登录成功，正在跳转...');
                    setTimeout(function() { window.location.href = '/tokens.html'; }, 1000);
                }
            } else {
                showAlert(result.error || '登录失败', 'error');
            }
        } catch (e) {
            showAlert('登录失败: ' + e.message, 'error');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        handleLogin({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        });
    });

    document.addEventListener('DOMContentLoaded', checkLoginStatus);
</script>
</body>
</html>
